<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusBot - Event Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="simple_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="simple_index.html" class="logo-container">
                <img src="logo.svg" alt="CampusBot Logo" class="nav-logo">
                <span class="logo-text">CampusBot</span>
            </a>
            <ul class="nav-links">
                <li><a href="simple_index.html#hero">Home</a></li>
                <li><a href="simple_index.html#features">Features</a></li>
                <li><a href="simple_index.html#events">Events</a></li>
                <li><a href="simple_index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Registration Section -->
    <section class="events-section" style="min-height: 70vh; display: flex; align-items: center;">
        <div class="container">
            <h2 class="section-heading">Event Registration</h2>
            <p class="section-subtitle">Fill out the form below to secure your spot for upcoming events.</p>
            
            <div class="eligibility-form" style="max-width: 600px; margin: 0 auto;">
                <form id="register-form">
                    <div class="field-group" style="margin-bottom: 20px;">
                        <label for="event-select">Select Event</label>
                        <select id="event-select" required>
                            <option value="">-- Choose an Event --</option>
                            <!-- Options will be populated by JS -->
                        </select>
                    </div>
                    
                    <div class="field-group" style="margin-bottom: 20px;">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="field-group" style="margin-bottom: 20px;">
                        <label for="branch">Branch / Department</label>
                        <input type="text" id="branch" placeholder="e.g. Computer Science, Mechanical" required>
                    </div>
                    
                    <div class="field-group" style="margin-bottom: 30px;">
                        <label for="contact">Contact Number</label>
                        <input type="tel" id="contact" placeholder="Enter your contact number" required pattern="[0-9]{10}" title="Please enter a valid 10-digit number">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Register Now</button>
                    
                    <div id="register-result" class="eligibility-result" aria-live="polite" style="display: none; margin-top: 20px; text-align: center;"></div>
                </form>
            </div>
        </div>
    </section>

    <!-- Contact / Footer -->
    <footer id="contact" class="footer-section">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>CampusBot</h3>
                    <p>Intelligent Automation for College Admin.</p>
                </div>
                <div class="footer-contact-details">
                    <p><i class="fas fa-envelope"></i> nmulvant@gmail.com</p>
                    <p><i class="fas fa-phone"></i> +91 9313209845</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 CampusBot Project.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
