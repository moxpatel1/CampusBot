<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chat Bubble -->
  <path d="M40,40 H160 A20,20 0 0,1 180,60 V130 A20,20 0 0,1 160,150 H140 L110,180 L100,150 H40 A20,20 0 0,1 20,130 V60 A20,20 0 0,1 40,40 Z" 
        fill="url(#grad1)" />
        
  <!-- Graduation Cap (White stroke/fill inside the bubble) -->
  <path d="M100,65 L140,85 L100,105 L60,85 Z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <path d="M140,85 V110" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M100,105 V125" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Tassel -->
  <path d="M140,85 L145,100" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
</svg>
